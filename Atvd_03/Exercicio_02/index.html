<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Figma</div>

  <nav>
    <ul class="menu">
      <li><a href="#">Produtos</a></li>
      <li><a href="#">Soluções</a></li>
      <li><a href="#">Comunidade</a></li>
      <li><a href="#">Recursos</a></li>
      <li><a href="#">Preços</a></li>
    </ul>
  </nav>

  <div class="actions">
    <a href="#">Entrar</a>
    <button class="btn-outline">Fale com a equipe de vendas</button>
    <button class="btn-black">Comece sem custos</button>
  </div>
</header>

<main>
  <section class="hero">
    
    <div class="text">
      <h1>Figma Design</h1>
      <p>
        O Figma é uma ferramenta de design poderosa e colaborativa para equipes.
        Explore ideias e obtenha feedback, crie protótipos realistas e otimize
        o desenvolvimento de produtos com design systems.
      </p>

      <div class="buttons">
        <button class="btn-black">Comece agora</button>
        <button class="btn-outline">Fale com a equipe de vendas</button>
      </div>
    </div>

    <aside class="shapes" aria-hidden="true">
      <div class="circle"></div>
      <div class="diamond"></div>
      <div class="blob"></div>
    </aside>

  </section>
</main>

</body>
</html>
